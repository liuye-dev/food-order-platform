services:
  mysql:
    image: mysql:8.0
    container_name: food-order-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: food_order_platform
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: food_order_user
      MYSQL_PASSWORD: food_order_pass
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: food-order-platform-backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: docker-demo-secret-key
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DB_NAME: food_order_platform
      DB_USER: food_order_user
      DB_PASSWORD: food_order_pass
      DB_HOST: mysql
      DB_PORT: "3306"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: food-order-platform-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
